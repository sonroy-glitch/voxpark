services:
  - type: web
    name: voxpark-backend
    env: python
    buildCommand: "pip install -r requirements.txt && prisma generate"
    startCommand: "gunicorn backend:app --bind 0.0.0.0:$PORT --timeout 120 --workers 2"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DATABASE_URL
        sync: false
      - key: ASSEMBLYAI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
